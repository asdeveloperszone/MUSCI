name: Build & Sign Music Player

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.4"
      - run: gradle wrapper --gradle-version 8.4
      - run: chmod +x gradlew
      - run: ./gradlew assembleDebug --stacktrace
      - run: ./gradlew assembleRelease --stacktrace
      - run: ./gradlew bundleRelease --stacktrace
      - name: Decode Keystore
        run: echo "${{ secrets.SIGNING_KEY }}" | base64 -d > keystore.jks
      - name: Sign APK
        run: |
          BT=$(ls /usr/local/lib/android/sdk/build-tools/ | sort -V | tail -1)
          /usr/local/lib/android/sdk/build-tools/$BT/zipalign -v 4 app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/app-aligned.apk
          /usr/local/lib/android/sdk/build-tools/$BT/apksigner sign --ks keystore.jks --ks-key-alias "${{ secrets.KEY_ALIAS }}" --ks-pass pass:"${{ secrets.KEY_STORE_PASSWORD }}" --key-pass pass:"${{ secrets.KEY_PASSWORD }}" --min-sdk-version 28 --out app/build/outputs/apk/release/MusicPlayer-signed.apk app/build/outputs/apk/release/app-aligned.apk
      - name: Sign AAB
        run: jarsigner -keystore keystore.jks -storepass "${{ secrets.KEY_STORE_PASSWORD }}" -keypass "${{ secrets.KEY_PASSWORD }}" -signedjar app/build/outputs/bundle/release/MusicPlayer-signed.aab app/build/outputs/bundle/release/app-release.aab "${{ secrets.KEY_ALIAS }}"
      - uses: actions/upload-artifact@v4
        with:
          name: Debug-APK
          path: app/build/outputs/apk/debug/*.apk
      - uses: actions/upload-artifact@v4
        with:
          name: Signed-APK
          path: app/build/outputs/apk/release/MusicPlayer-signed.apk
      - uses: actions/upload-artifact@v4
        with:
          name: Signed-AAB
          path: app/build/outputs/bundle/release/MusicPlayer-signed.aab
